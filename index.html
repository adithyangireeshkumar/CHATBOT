<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Paper Assistant</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #09090b;
            --border-color: #27272a;
            --card-bg: #18181b;
            --text-main: #fafafa;
            --text-muted: #a1a1aa;
            --accent-color: #ffffff;
            --user-bubble-bg: #27272a;
            --font-family: 'Geist', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Layout Container --- */
        .app-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 40px 24px;
            position: relative;
        }

        header {
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        /* --- Minimalist Uploader --- */
        .upload-section {
            border: 1px dashed var(--border-color);
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 40px 24px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background-color 0.2s;
            margin-bottom: 24px;
        }

        .upload-section:hover, .upload-section.dragover {
            border-color: var(--text-muted);
            background-color: rgba(255, 255, 255, 0.01);
        }

        .upload-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .upload-subtitle {
            font-size: 12px;
            color: var(--text-muted);
        }

        #file-input {
            display: none;
        }

        /* --- Document Status Header --- */
        .doc-bar {
            display: none;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 18px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .doc-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .doc-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-main);
            max-width: 400px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .doc-meta {
            font-size: 11px;
            color: var(--text-muted);
            background-color: var(--bg-color);
            padding: 2px 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .btn-change {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            text-decoration: underline;
        }

        .btn-change:hover {
            color: var(--text-main);
        }

        /* --- Quick Actions (Collapsible Sections) --- */
        .analysis-accordion {
            display: none;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }

        .accordion-item {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            background-color: var(--card-bg);
        }

        .accordion-header {
            width: 100%;
            background: none;
            border: none;
            padding: 12px 16px;
            color: var(--text-main);
            font-family: var(--font-family);
            font-size: 13px;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s;
        }

        .accordion-header:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .accordion-content {
            display: none;
            padding: 16px;
            border-top: 1px solid var(--border-color);
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
            max-height: 250px;
            overflow-y: auto;
        }

        /* --- Chat Q&A Panels --- */
        .chat-container {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-right: 4px;
            margin-bottom: 24px;
        }

        .welcome-screen {
            margin: auto;
            text-align: center;
            max-width: 480px;
            padding: 40px 0;
        }

        .welcome-screen h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: -0.4px;
        }

        .welcome-screen p {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* --- Messages --- */
        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.agent {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.6;
            word-break: break-word;
        }

        .message-row.user .message-bubble {
            background-color: var(--user-bubble-bg);
            color: var(--text-main);
            border-bottom-right-radius: 2px;
        }

        .message-row.agent .message-bubble {
            background-color: transparent;
            padding-left: 0;
            padding-right: 0;
            color: var(--text-main);
        }

        /* Markdown Styles Inside Bubble */
        .message-bubble h1, .message-bubble h2, .message-bubble h3 {
            margin-top: 12px;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
        }
        .message-bubble h1 { font-size: 16px; }
        .message-bubble h2 { font-size: 14px; }
        .message-bubble h3 { font-size: 13px; }
        
        .message-bubble p {
            margin-bottom: 10px;
        }
        .message-bubble p:last-child {
            margin-bottom: 0;
        }

        .message-bubble ul, .message-bubble ol {
            margin-left: 18px;
            margin-bottom: 12px;
        }

        .message-bubble li {
            margin-bottom: 4px;
        }

        .message-bubble code {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 2px 5px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
        }

        .pages-referenced {
            margin-top: 8px;
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .page-badge {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 1px 5px;
            font-weight: 500;
        }

        /* --- Input Box --- */
        .input-panel {
            background-color: var(--bg-color);
        }

        .input-container {
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-input {
            flex-grow: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-main);
            font-family: var(--font-family);
            font-size: 13px;
            resize: none;
            height: 20px;
            max-height: 120px;
            line-height: 1.5;
        }

        .send-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            color: var(--text-main);
        }

        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* --- Settings Panel (Minimalist Popover) --- */
        .settings-link {
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            text-decoration: underline;
            background: none;
            border: none;
            outline: none;
        }

        .settings-link:hover {
            color: var(--text-main);
        }

        .settings-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .settings-box {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            padding: 24px;
        }

        .settings-header {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            display: block;
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            padding: 8px 12px;
            font-family: var(--font-family);
            font-size: 12px;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--text-muted);
        }

        .btn-close-settings {
            background-color: var(--text-main);
            color: var(--bg-color);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }

        /* --- Typing Indicator --- */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 0;
            align-items: center;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background-color: var(--text-muted);
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.3s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="logo">Research Assist</div>
            <button class="settings-link" onclick="openSettings()">Configure</button>
        </header>

        <!-- Uploader -->
        <div class="upload-section" id="upload-zone">
            <div class="upload-title">Drop PDF file here</div>
            <div class="upload-subtitle">or click to choose file</div>
            <input type="file" id="file-input" accept=".pdf">
        </div>

        <!-- Document Status Bar -->
        <div class="doc-bar" id="doc-bar">
            <div class="doc-info">
                <span style="font-size:16px;">📄</span>
                <div class="doc-title" id="doc-title">research-paper.pdf</div>
                <div class="doc-meta" id="doc-pages">0 pages</div>
            </div>
            <button class="btn-change" onclick="triggerNewUpload()">Change</button>
        </div>

        <!-- Quick Accordion Summary Sections -->
        <div class="analysis-accordion" id="analysis-accordion">
            <div class="accordion-item">
                <button class="accordion-header" onclick="toggleAccordion('acc-summary')">
                    <span>Summary</span>
                    <span class="acc-arrow" id="arrow-acc-summary">▼</span>
                </button>
                <div class="accordion-content" id="acc-summary">Loading...</div>
            </div>
            <div class="accordion-item">
                <button class="accordion-header" onclick="toggleAccordion('acc-contribs')">
                    <span>Key Contributions</span>
                    <span class="acc-arrow" id="arrow-acc-contribs">▼</span>
                </button>
                <div class="accordion-content" id="acc-contribs">Loading...</div>
            </div>
            <div class="accordion-item">
                <button class="accordion-header" onclick="toggleAccordion('acc-terms')">
                    <span>Technical Terms</span>
                    <span class="acc-arrow" id="arrow-acc-terms">▼</span>
                </button>
                <div class="accordion-content" id="acc-terms">Loading...</div>
            </div>
        </div>

        <!-- Chat Container -->
        <div class="chat-container" id="chat-area">
            <!-- Welcome screen -->
            <div class="welcome-screen" id="welcome-screen">
                <h2>Read research papers faster.</h2>
                <p>Upload a PDF document to automatically generate context summaries, extract technical terms, and ask specific questions.</p>
            </div>
        </div>

        <!-- Input Box -->
        <div class="input-panel">
            <div class="input-container">
                <textarea class="chat-input" id="chat-input" rows="1" placeholder="Ask a question about the document..." disabled></textarea>
                <button class="send-btn" id="send-btn" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Minimalist Settings Modal -->
    <div class="settings-modal" id="settings-modal">
        <div class="settings-box">
            <div class="settings-header">
                <span>Configuration</span>
                <span style="cursor:pointer;" onclick="closeSettings()">✕</span>
            </div>
            <div class="form-group">
                <label class="form-label" for="api-key-input">Override Groq Key</label>
                <input type="password" class="form-input" id="api-key-input" placeholder="gsk_...">
            </div>
            <div class="form-group">
                <label class="form-label" for="api-url-input">Backend API URL</label>
                <input type="text" class="form-input" id="api-url-input" placeholder="https://research-paper-assistand-backend.onrender.com">
            </div>
            <button class="btn-close-settings" onclick="closeSettings()">Save Settings</button>
        </div>
    </div>

    <script>
        // Automatic upgrade for API path
        if (localStorage.getItem("API_BASE") === "http://127.0.0.1:8000" || localStorage.getItem("API_BASE") === "http://localhost:8000" || !localStorage.getItem("API_BASE")) {
            localStorage.setItem("API_BASE", "https://research-paper-assistand-backend.onrender.com");
        }
        let apiBase = localStorage.getItem("API_BASE") || "https://research-paper-assistand-backend.onrender.com";
        let activePaperId = null;

        // Elements
        const uploadZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');
        const docBar = document.getElementById('doc-bar');
        const docTitle = document.getElementById('doc-title');
        const docPages = document.getElementById('doc-pages');
        const analysisAccordion = document.getElementById('analysis-accordion');
        
        const accSummary = document.getElementById('acc-summary');
        const accContribs = document.getElementById('acc-contribs');
        const accTerms = document.getElementById('acc-terms');
        
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const chatArea = document.getElementById('chat-area');
        const welcomeScreen = document.getElementById('welcome-screen');
        
        const settingsModal = document.getElementById('settings-modal');
        const apiKeyInput = document.getElementById('api-key-input');
        const apiUrlInput = document.getElementById('api-url-input');

        // Initialize Settings Inputs
        apiUrlInput.value = apiBase;
        apiUrlInput.addEventListener('change', () => {
            let val = apiUrlInput.value.trim();
            if (val) {
                if (val.endsWith('/')) val = val.slice(0, -1);
                localStorage.setItem("API_BASE", val);
                apiBase = val;
            }
        });

        function openSettings() { settingsModal.style.display = 'flex'; }
        function closeSettings() { settingsModal.style.display = 'none'; }

        // Trigger New Upload
        function triggerNewUpload() {
            fileInput.click();
        }

        // Accordion Controls
        function toggleAccordion(id) {
            const content = document.getElementById(id);
            const arrow = document.getElementById(`arrow-${id}`);
            if (content.style.display === 'block') {
                content.style.display = 'none';
                arrow.innerText = '▼';
            } else {
                content.style.display = 'block';
                arrow.innerText = '▲';
            }
        }

        // Auto-resize chat input textarea
        chatInput.addEventListener('input', () => {
            chatInput.style.height = '20px';
            chatInput.style.height = (chatInput.scrollHeight - 4) + 'px';
            sendBtn.disabled = !chatInput.value.trim();
        });

        // Click to upload
        uploadZone.addEventListener('click', () => fileInput.click());

        // Drag & Drop
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFileUpload(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) {
                handleFileUpload(fileInput.files[0]);
            }
        });

        // Handle File Upload
        async function handleFileUpload(file) {
            if (file.type !== "application/pdf") {
                alert("Please upload a valid PDF file.");
                return;
            }

            // Reset UI State
            welcomeScreen.style.display = 'none';
            chatArea.innerHTML = '';
            appendMessage("agent", "⏳ Reading, semantic indexing, and analyzing paper... Please wait a few seconds.");
            
            chatInput.disabled = true;
            sendBtn.disabled = true;

            const formData = new FormData();
            formData.append("file", file);
            
            const customKey = apiKeyInput.value.trim();
            if (customKey) {
                formData.append("api_key", customKey);
            }

            try {
                const response = await fetch(`${apiBase}/upload`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || "Failed to process PDF.");
                }

                const data = await response.json();
                
                activePaperId = data.paper_id;

                // Update Status Bar
                docTitle.innerText = data.title;
                docPages.innerText = `${data.page_count} pages`;
                uploadZone.style.display = 'none';
                docBar.style.display = 'flex';

                // Fill Accordions
                accSummary.innerHTML = formatMarkdown(data.summary);
                accContribs.innerHTML = formatMarkdown(data.contributions);
                accTerms.innerHTML = formatMarkdown(data.technical_terms);
                analysisAccordion.style.display = 'flex';

                // Enable Chat
                chatInput.disabled = false;

                // Display success
                chatArea.innerHTML = '';
                appendMessage("agent", "✅ **Paper loaded and RAG index initialized.** You can view the automatically generated analysis above, and ask questions below.");

            } catch (err) {
                chatArea.innerHTML = '';
                appendMessage("agent", `❌ **Error:** ${err.message}. Make sure the backend is active.`);
            }
        }

        // Chat Send Query
        sendBtn.addEventListener('click', sendQuery);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendQuery();
            }
        });

        async function sendQuery() {
            const query = chatInput.value.trim();
            if (!query || !activePaperId) return;

            appendMessage("user", query);
            chatInput.value = '';
            chatInput.style.height = '20px';
            sendBtn.disabled = true;

            const typingRow = appendTypingIndicator();
            chatArea.scrollTop = chatArea.scrollHeight;

            const payload = {
                query: query,
                paper_id: activePaperId
            };

            const customKey = apiKeyInput.value.trim();
            if (customKey) {
                payload.api_key = customKey;
            }

            try {
                const response = await fetch(`${apiBase}/query`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || "Query failed.");
                }

                const data = await response.json();
                typingRow.remove();

                appendMessage("agent", data.answer, data.pages);

            } catch (err) {
                typingRow.remove();
                appendMessage("agent", `❌ **Error:** ${err.message}`);
            }
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function appendMessage(sender, text, pages = []) {
            const row = document.createElement('div');
            row.className = `message-row ${sender}`;

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = formatMarkdown(text);

            if (pages && pages.length > 0) {
                const pagesDiv = document.createElement('div');
                pagesDiv.className = 'pages-referenced';
                pagesDiv.innerHTML = `<span>Page refs:</span>` + pages.map(p => `<span class="page-badge">${p}</span>`).join(' ');
                bubble.appendChild(pagesDiv);
            }

            row.appendChild(bubble);
            chatArea.appendChild(row);
            chatArea.scrollTop = chatArea.scrollHeight;
            return row;
        }

        function appendTypingIndicator() {
            const row = document.createElement('div');
            row.className = 'message-row agent';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            
            bubble.appendChild(indicator);
            row.appendChild(bubble);
            chatArea.appendChild(row);
            return row;
        }

        // Markdown Formatter (Headers, Bold, Lists, Code)
        function formatMarkdown(text) {
            if (!text) return "";
            let lines = text.split('\n');
            let html = [];
            let inList = false;

            for (let line of lines) {
                let trimmed = line.trim();
                trimmed = trimmed.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                trimmed = trimmed.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                trimmed = trimmed.replace(/`(.*?)`/g, '<code>$1</code>');

                if (trimmed.startsWith('### ')) {
                    if (inList) { html.push('</ul>'); inList = false; }
                    html.push(`<h3>${trimmed.substring(4)}</h3>`);
                } else if (trimmed.startsWith('## ')) {
                    if (inList) { html.push('</ul>'); inList = false; }
                    html.push(`<h2>${trimmed.substring(3)}</h2>`);
                } else if (trimmed.startsWith('# ')) {
                    if (inList) { html.push('</ul>'); inList = false; }
                    html.push(`<h1>${trimmed.substring(2)}</h1>`);
                } else if (trimmed.startsWith('- ') || trimmed.startsWith('* ') || (trimmed.match(/^\d+\.\s/) && !isNaN(trimmed.split('.')[0]))) {
                    if (!inList) { html.push('<ul>'); inList = true; }
                    let content = trimmed.startsWith('- ') || trimmed.startsWith('* ') 
                        ? trimmed.substring(2) 
                        : trimmed.substring(trimmed.indexOf('.') + 2);
                    html.push(`<li>${content}</li>`);
                } else if (trimmed === '') {
                    if (inList) { html.push('</ul>'); inList = false; }
                    html.push('<div class="spacer"></div>');
                } else {
                    if (inList) { html.push('</ul>'); inList = false; }
                    html.push(`<p>${trimmed}</p>`);
                }
            }
            if (inList) { html.push('</ul>'); }
            return html.join('');
        }
    </script>
</body>
</html>
